<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reepo - Random GitHub Repo Discovery</title>
  <meta name="description" content="Discover random GitHub repositories in a fun, gamified way. Spin, explore, collect.">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Top Bar -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-logo">Reepo</h1>
        <span class="header-badge">v2.0</span>
      </div>
      <div class="header-center">
        <div id="search-container"></div>
      </div>
      <nav class="app-nav">
        <button class="nav-btn" id="collections-btn" title="Collections"><span>📁</span></button>
        <button class="nav-btn" id="dashboard-btn" title="Stats"><span>📊</span></button>
        <button class="nav-btn" id="profile-btn" title="Profile"><span>👤</span></button>
        <button class="nav-btn" id="settings-btn" title="Settings"><span>⚙️</span></button>
      </nav>
    </header>

    <!-- Main Game Area -->
    <div class="app-body">
      <main id="main-content" class="main-content"></main>
    </div>

    <!-- Bottom Notification Area -->
    <div id="notification-container" class="notification-container"></div>
    
    <!-- Bottom Footer Bar -->
    <footer class="app-footer">
      <div class="footer-left">
        <button class="footer-btn" id="filter-toggle-btn" title="Filters">🔍 <span id="filter-active-count" class="badge"></span></button>
        <button class="footer-btn" id="history-toggle-btn" title="History">🕒</button>
        <button class="footer-btn" id="home-btn" title="Home">🏠</button>
      </div>
      <div class="footer-center">
        <div id="discovery-mode-container" class="discovery-mode-bar"></div>
      </div>
      <div class="footer-right">
        <p class="footer-text" id="footer-text"></p>
      </div>
    </footer>
  </div>

  <!-- Modals -->
  <div id="profile-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close-modal" id="close-profile-modal">&times;</span>
      <div id="profile-content"></div>
    </div>
  </div>
  <div id="settings-modal" class="modal" style="display:none;">
    <div class="modal-content settings-modal-content">
      <span class="close-modal" id="close-settings-modal">&times;</span>
      <div id="settings-content"></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(r => r.unregister());
      }).catch(() => {});
    }
  </script>
  <script type="module" src="js/app.js?v=20260722"></script>
</body>
</html>
