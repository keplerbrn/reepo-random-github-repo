<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reepo - Discover GitHub Repositories</title>
  <meta name="description" content="Discover open-source GitHub repositories through a randomized, rewarding experience.">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">

  <!-- Open Graph -->
  <meta property="og:title" content="Reepo - Discover GitHub Repositories">
  <meta property="og:description" content="Randomized discovery, collections, badges and more. Explore the unexpected.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://reepo.github.io/">
  <meta property="og:image" content="https://reepo.github.io/assets/icons/icon.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Reepo - Discover GitHub Repositories">
  <meta name="twitter:description" content="Randomized discovery of GitHub repos with gamification.">
  <meta name="twitter:image" content="https://reepo.github.io/assets/icons/icon.svg">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header" role="banner">
      <div class="header-content">
        <h1 class="app-logo" id="app-logo">Reepo</h1>
        <p class="app-tagline" id="app-tagline">Discover GitHub Repositories</p>
      </div>
      <div class="header-search" id="search-container"></div>
      <nav class="app-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-button" id="filter-toggle-btn" aria-label="Toggle Filters"><span class="nav-icon">🔍</span> Filters <span id="filter-active-count" class="badge"></span></button>
        <button class="nav-button" id="history-toggle-btn" aria-label="Toggle History"><span class="nav-icon">🕒</span> History</button>
        <button class="nav-button" id="collections-btn" aria-label="View Collections"><span class="nav-icon">📁</span> Collections</button>
        <button class="nav-button" id="dashboard-btn" aria-label="Dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </button>
        <button class="nav-button" id="settings-btn" aria-label="Settings">
          <span class="nav-icon">⚙️</span> Settings
        </button>
        <button class="nav-button" id="profile-btn" aria-label="Profile">
          <span class="nav-icon">👤</span> Profile
        </button>
      </nav>
    </header>

    <div id="discovery-mode-container" class="discovery-mode-bar"></div>

    <div class="app-body">
      <div id="filter-panel-container" class="side-panel" style="display:none;"></div>
      <main id="main-content" class="main-content" role="main">
        <div class="card-skeleton" role="status"><div class="skeleton-header"></div><div class="skeleton-description"></div><div class="skeleton-stats"></div><div class="skeleton-actions"></div></div>
      </main>
      <div id="history-panel-container" class="side-panel" style="display:none;"></div>
    </div>

    <div id="notification-container" class="notification-container"></div>
    
    <footer class="app-footer" role="contentinfo"><p class="footer-text" id="footer-text"></p></footer>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="profile-title" style="display:none;">
    <div class="modal-content">
      <span class="close-modal" id="close-profile-modal">&times;</span>
      <div id="profile-content"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title" style="display:none;">
    <div class="modal-content">
      <span class="close-modal" id="close-settings-modal">&times;</span>
      <div id="settings-content"></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      }).catch(() => {});
    }
  </script>
  <script type="module" src="js/app.js?v=20260722"></script>
</body>
</html>
